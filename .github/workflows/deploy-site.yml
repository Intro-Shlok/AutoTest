name: Astro Site Build & Deploy

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Copy API, llms.txt to dist
        run: |
          cp -r public/api dist/
          cp llms.txt llms-full.txt dist/

      - name: Commit to main/docs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          rm -rf main/docs
          mkdir -p main/docs
          cp -r dist/* main/docs/
          cd main
          git add -A
          git diff --staged --quiet || git commit -m "Build: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main --force