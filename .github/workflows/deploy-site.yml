name: Astro Site Build & Deploy

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build JSON API (with snapshots + embeddings)
        run: node src/scripts/build-api.js

      - name: Build Astro site
        run: npm run build

      - name: Copy snapshots and API into dist
        run: |
          mkdir -p dist/snapshots dist/api dist/.well-known
          cp -r snapshots/* dist/snapshots/ 2>/dev/null || true
          cp -r public/api dist/api/ 2>/dev/null || true
          cp -r llms.txt llms-full.txt dist/ 2>/dev/null || true

      - name: Generate semantic chunk manifest
        run: node scripts/generate-semantic-chunks.js

      - name: Generate retrieval manifest
        run: node scripts/generate-retrieval-manifest.js

      - name: Commit to main/docs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          rm -rf main/docs
          mkdir -p main/docs
          cp -r dist/* main/docs/
          cd main
          git add -A
          git diff --staged --quiet || git commit -m "Build: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main --force